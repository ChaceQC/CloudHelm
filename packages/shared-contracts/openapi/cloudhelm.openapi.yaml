          - type: 'null'
          title: Structured Output Json
        error_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Code
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        input_tokens:
          type: integer
          title: Input Tokens
