          type: string
          title: Agent Type
        status:
          $ref: '#/components/schemas/AgentRunStatus'
        model_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Name
        prompt_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Hash
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
        structured_output_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Structured Output Type
        structured_output_json:
          anyOf:
          - additionalProperties: true
