components:
  schemas:
    AgentRunCreate:
      properties:
        agent_type:
          type: string
          minLength: 1
          title: Agent Type
          description: Agent 类型。
        status:
          $ref: '#/components/schemas/AgentRunStatus'
          description: 运行状态。
          default: pending
        model_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Name
          description: 模型名称。
        prompt_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Hash
          description: Prompt 哈希。
        summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Summary
          description: 结构化输出或失败摘要。
        structured_output_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Structured Output Type
          description: 结构化输出类型。
        structured_output_json:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Structured Output Json
          description: 结构化输出 JSON。
        error_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Code
          description: 失败错误码。
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
          description: 失败错误信息。
        input_tokens:
          type: integer
          minimum: 0.0
          title: Input Tokens
          description: 输入 token 数。
          default: 0
        output_tokens:
          type: integer
          minimum: 0.0
          title: Output Tokens
          description: 输出 token 数。
          default: 0
        cost_usd:
          anyOf:
          - type: number
            minimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Cost Usd
          description: 估算成本。
          default: '0'
      type: object
      required:
      - agent_type
      title: AgentRunCreate
      description: '开发/内部联调用 AgentRun 创建请求体。


        M2 该接口只写入运行记录，不表示 Agent 已具备自动执行能力。'
