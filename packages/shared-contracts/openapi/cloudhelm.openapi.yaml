openapi: 3.1.0
info:
  title: CloudHelm Platform API
  description: CloudHelm 平台 API。M4 提供真实数据库驱动的项目、任务、需求、设计、开发计划、审批、事件和 Agent 编排底座。
  version: 0.4.0
paths:
  /health:
    get:
      tags:
      - health
      summary: 读取平台 API 健康状态
      description: "返回平台 API 的真实运行元数据。\n\n参数:\n    settings: 由环境变量解析得到的服务配置。\n\n返回:\n\
        \    服务名、状态、版本、运行环境和服务端当前 UTC 时间。"
      operationId: read_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          description: 业务请求错误。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资源不存在。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 状态冲突。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 请求参数校验失败。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
