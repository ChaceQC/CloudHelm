services:
  sample-service:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    stop_grace_period: 5s
